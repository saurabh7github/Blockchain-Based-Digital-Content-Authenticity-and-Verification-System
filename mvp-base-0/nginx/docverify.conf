# nginx/docverify.conf
#
# Nginx reverse-proxy + static asset server for DocVerify.
#
# Setup:
#   1. Copy this file to /etc/nginx/sites-available/docverify.conf
#   2. Symlink: sudo ln -s /etc/nginx/sites-available/docverify.conf \
#                           /etc/nginx/sites-enabled/docverify.conf
#   3. Obtain TLS cert (adjust paths or use Certbot):
#        sudo certbot --nginx -d yourdomain.com
#   4. sudo nginx -t && sudo systemctl reload nginx
#
# Assumptions:
#   - React build is at       /var/www/docverify/html
#   - Node.js backend runs on port 5000 (PM2 / systemd service)
#   - Domain                  yourdomain.com  (replace everywhere below)
#   - TLS cert via Let's Encrypt (certbot)

# ── HTTP: redirect all traffic to HTTPS ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: main server block ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS ──────────────────────────────────────────────────────────────────
    # Replace with your cert paths (Certbot updates these automatically).
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY                                          always;
    add_header X-Content-Type-Options     nosniff                                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"    always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.edenai.run https://api.pinata.cloud wss:; font-src 'self'; frame-ancestors 'none';"
        always;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/docverify.access.log;
    error_log  /var/log/nginx/docverify.error.log warn;

    # ── Static React build ───────────────────────────────────────────────────
    root  /var/www/docverify/html;
    index index.html;

    # Serve static assets with long-lived cache headers
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React Router (BrowserRouter) — all non-API paths fall through to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy ────────────────────────────────────────────────────
    # All /api/* requests are forwarded to the Node.js backend.
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # File upload: raise body size to match multer 10 MB limit
        client_max_body_size 11m;

        # Reasonable timeouts for AI analysis (can be slow)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        # Do not buffer large AI responses
        proxy_buffering off;
    }

    # ── Health check endpoint (no rate limit, no auth) ───────────────────────
    location = /api/health {
        proxy_pass http://127.0.0.1:5000/api/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Block hidden files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
