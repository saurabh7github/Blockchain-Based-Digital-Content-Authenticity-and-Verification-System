version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: docverify-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: docverifier
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - docverify-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/docverifier --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./verifier-backend
      dockerfile: Dockerfile
    container_name: docverify-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_USER:-docverify_user}:${MONGO_PASSWORD}@mongodb:27017/docverifier?authSource=docverifier
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-winstonai}
      AI_BLOCK_THRESHOLD: ${AI_BLOCK_THRESHOLD:-80}
      PINATA_API_KEY: ${PINATA_API_KEY:-}
      PINATA_SECRET_KEY: ${PINATA_SECRET_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - docverify-network

  frontend:
    build:
      context: ./verifier-client
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000}
        REACT_APP_CONTRACT_ADDRESS: ${REACT_APP_CONTRACT_ADDRESS:-0x83ed6653dB8c25Bacebf6B3110e352bfE6F9196c}
    container_name: docverify-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - docverify-network

networks:
  docverify-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
